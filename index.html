<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1 class="title">Todo App</h1>
    <div class="input-area">
      <input id="task-input" type="text" placeholder="タスクを入力" />
      <button id="add-button">追加</button>
    </div>
    <ul id="task-list" class="task-list" aria-live="polite"></ul>
  </div>
  <script>
    // タスクの保存・復元（LocalStorage）
    const TASKS_KEY = 'todo-app.tasks';
    const input = document.getElementById('task-input');
    const btn = document.getElementById('add-button');
    const list = document.getElementById('task-list');

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem(TASKS_KEY) || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveTasks(tasks) {
      localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
    }

    function renderTasks() {
      list.innerHTML = '';
      const tasks = loadTasks();
      tasks.forEach((t) => {
        const li = document.createElement('li');
        li.textContent = t;
        list.appendChild(li);
      });
    }

    function addTask(value) {
      const v = value.trim();
      if (!v) return;
      const tasks = loadTasks();
      tasks.push(v);
      saveTasks(tasks);
      renderTasks();
      input.value = '';
      input.focus();
    }

    btn.addEventListener('click', () => addTask(input.value));
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(input.value); });

    // 初期表示
    renderTasks();
  </script>
</body>
</html>
